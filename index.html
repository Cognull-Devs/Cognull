    <script>
      // Intercept CSS injection by Vite and load non-blocking
      (function() {
        var cssLoaded = false;
        function makeCSSNonBlocking(link) {
          if (link.tagName === 'LINK' && (link.rel === 'stylesheet' || link.rel === 'import')) {
            link.media = 'print';
            link.onload = link.onerror = function() {
              link.media = 'all';
              cssLoaded = true;
            };
          }
        }
        // Observe for CSS links added to head (Vite injection)
        new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            if (m.addedNodes.length) {
              m.addedNodes.forEach(function(node) {
                if (node.nodeType === 1) makeCSSNonBlocking(node);
              });
            }
          });
        }).observe(document.head, { childList: true, subtree: true });
      })();
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" media="print" onload="this.media='all'" />
